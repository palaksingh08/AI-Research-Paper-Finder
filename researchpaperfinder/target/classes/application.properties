spring.application.name=researchpaperfinder

# Spring Boot configuration for Research Paper Finder
# Tomcat deployment settings
server.port=9090
server.servlet.context-path=/research-paper-finder

# Semantic Scholar API (no key needed for basic search)
semanticscholar.api.base-url=https://api.semanticscholar.org/graph/v1/paper/search

# Logging
logging.level.com.project=DEBUG
logging.level.org.springframework.web=INFO

# JSON settings
spring.jackson.default-property-inclusion=non_null
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
