<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Research Paper Finder</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Research Paper Finder</h1>
        <button id="dark-mode-toggle">Toggle Dark Mode</button>
    </header>
    <main>
        <section id="search">
            <input type="text" id="search-term" placeholder="Search for papers...">
            <div id="year-filters">
                <label for="start-year">From:</label>
                <input type="number" id="start-year" min="2020" max="2026" value="2020">
                <label for="end-year">To:</label>
                <input type="number" id="end-year" min="2020" max="2026" value="2026">
            </div>
            <button id="search-button">Search</button>
        </section>
        <section id="sort-options">
            <label for="sort-by">Sort by:</label>
            <select id="sort-by">
                <option value="relevance">Relevance</option>
                <option value="recent">Recent</option>
                <option value="cited">Most Cited</option>
            </select>
        </section>
        <section id="results">
            <h2>Results:</h2>
            <div id="results-container"></div>
            <div id="loading-spinner" style="display:none;">Loading...</div>
        </section>
        <button id="export-csv">Export as CSV</button>
    </main>
    <footer>
        <p>&copy; 2026 Research Paper Finder. All rights reserved.</p>
    </footer>
    <script>
        // Dark mode toggle functionality
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
        });
        // Check for saved dark mode preference
        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Year range filters and search
        document.getElementById('search-button').addEventListener('click', function() {
            const startYear = document.getElementById('start-year').value;
            const endYear = document.getElementById('end-year').value;
            const searchTerm = document.getElementById('search-term').value;
            // Implement search functionality and filters here
            // Show loading spinner
            document.getElementById('loading-spinner').style.display = 'block';
        });

        // CSV export functionality placeholder
        document.getElementById('export-csv').addEventListener('click', () => {
            // Implement CSV export functionality
        });
    </script>
</body>
</html>
