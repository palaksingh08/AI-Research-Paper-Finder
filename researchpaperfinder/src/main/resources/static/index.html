<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Research Paper Finder - Semantic Scholar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: #333;
    line-height: 1.6;
    min-height: 100vh;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeInDown 1s ease;
}

.header h1 {
    font-size: clamp(2.5rem, 5vw, 4rem);
    background: linear-gradient(45deg, #fff, #f0f0f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    font-weight: 700;
}

.header p {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.9);
    font-weight: 300;
}

.search-section {
    display: flex;
    justify-content: center;
    margin-bottom: 40px;
    animation: fadeInUp 1s ease 0.3s both;
}

.search-box {
    display: flex;
    background: rgba(255,255,255,0.95);
    border-radius: 50px;
    padding: 5px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    width: min(90%, 600px);
    backdrop-filter: blur(20px);
}

#searchInput {
    flex: 1;
    border: none;
    outline: none;
    padding: 18px 25px;
    font-size: 1.1rem;
    background: transparent;
    color: #333;
    font-weight: 400;
}

#searchInput::placeholder {
    color: #888;
}

.search-btn {
    background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
    border: none;
    padding: 18px 30px;
    border-radius: 45px;
    color: white;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 20px rgba(255,107,107,0.3);
}

.search-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(255,107,107,0.4);
}

.search-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.results-header {
    text-align: center;
    margin: 40px 0 30px 0;
    font-size: 1.4rem;
    font-weight: 600;
    color: white;
    animation: fadeIn 0.8s ease;
    padding: 15px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

.results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 30px;
    margin-top: 20px;
}

.paper-card {
    background: rgba(255,255,255,0.95);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    height: 380px;
    overflow: hidden;
    position: relative;
    animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    opacity: 0;
    transform: translateY(50px);
}

.paper-card:nth-child(odd) {
    background: linear-gradient(145deg, rgba(255,255,255,0.98), rgba(248,250,252,0.95));
}

.paper-card:nth-child(even) {
    background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(250,250,255,0.98));
}

.paper-card:hover {
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 35px 70px rgba(0,0,0,0.15);
}

.paper-header {
    margin-bottom: 18px;
}

.paper-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: #1a202c;
    line-height: 1.35;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.paper-authors {
    font-size: 0.95rem;
    color: #4a5568;
    font-weight: 500;
    margin-bottom: 8px;
}

.paper-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    font-size: 0.9rem;
}

.paper-venue {
    color: #2d3748;
    font-weight: 500;
}

.paper-badge {
    background: linear-gradient(45deg, #48bb78, #38a169);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
}

.paper-abstract {
    color: #4a5568;
    font-size: 0.97rem;
    line-height: 1.55;
    margin-bottom: 20px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    max-height: 100px;
}

.paper-footer {
    position: absolute;
    bottom: 25px;
    left: 30px;
    right: 30px;
}

.read-btn {
    background: linear-gradient(45deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
    font-size: 1rem;
    box-shadow: 0 8px 20px rgba(102,126,234,0.3);
}

.read-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(102,126,234,0.4);
}

.no-results {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    padding: 70px 50px;
    text-align: center;
    max-width: 700px;
    margin: 80px auto;
    border: 1px solid rgba(255,255,255,0.3);
    animation: fadeIn 1s ease;
    box-shadow: 0 25px 50px rgba(0,0,0,0.1);
}

.no-results h3 {
    font-size: 1.8rem;
    color: white;
    margin-bottom: 25px;
    font-weight: 600;
}

.tips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 35px;
}

.tip-item {
    background: rgba(255,255,255,0.2);
    padding: 20px;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
}

.tip-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
}

.tip-item:hover {
    background: rgba(255,255,255,0.3);
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

.loading {
    text-align: center;
    padding: 80px 20px;
    color: white;
}

.loading i {
    font-size: 4rem;
    animation: spin 1.2s linear infinite;
    margin-bottom: 25px;
    display: block;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideInUp {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
    .search-box {
        flex-direction: column;
        border-radius: 25px;
        padding: 8px;
    }
    
    #searchInput {
        border-radius: 20px 20px 0 0;
        padding: 22px;
    }
    
    .search-btn {
        border-radius: 0 0 20px 20px;
        padding: 22px 30px;
    }
    
    .results-grid {
        grid-template-columns: 1fr;
        gap: 25px;
        padding: 0 10px;
    }
    
    .paper-card {
        padding: 25px;
        height: auto;
        min-height: 380px;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-brain"></i> AI Research Paper Finder</h1>
        <p>Millions of papers • Semantic Scholar powered • Instant access</p>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="artificial intelligence, cybersecurity, blockchain..." onkeypress="if(event.key==='Enter') searchPapers()">
            <button class="search-btn" onclick="searchPapers()" id="searchBtn">
                <i class="fas fa-rocket"></i> Find Papers
            </button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
	let timeout;
	let isLoading = false;

	function renderPapers(papers) {
	    let html = `<div class="results-header">
	            <i class="fas fa-file-alt"></i> Found <strong>${papers.length}</strong> papers
	        </div>
	        <div class="results-grid">`;
	    
	    papers.forEach((paper, index) => {
	        const authors = paper.authors ? paper.authors.filter(a => a !== 'N/A' && a !== 'Unknown').slice(0,3).join(', ') || 'Multiple Authors' : 'N/A';
	        const venue = paper.venue !== 'N/A' ? paper.venue : '';
	        const year = paper.year > 0 ? paper.year : 'N/A';
	        const abstractPreview = paper.abstractText.replace(/\\n/g, ' ').substring(0, 200) + '...';
	        const paperUrl = paper.url || `https://www.semanticscholar.org/paper/${paper.paperId}`;
	        
	        html += `
	            <div class="paper-card">
	                <div class="paper-header">
	                    <div class="paper-title">${paper.title}</div>
	                    <div class="paper-authors">${authors}</div>
	                </div>
	                <div class="paper-meta">
	                    <span class="paper-venue">${venue || 'Conference/Journal'}</span>
	                    <span class="paper-badge">${year}</span>
	                </div>
	                <div class="paper-abstract">${abstractPreview}</div>
	                <div class="paper-footer">
	                    <a href="${paperUrl}" target="_blank" class="read-btn">
	                        <i class="fas fa-external-link-alt"></i> Read Full Paper
	                    </a>
	                </div>
	            </div>
	        `;
	    });
	    
	    html += '</div>';
	    document.getElementById('results').innerHTML = html;
	    
	    // Stagger animations
	    document.querySelectorAll('.paper-card').forEach((card, i) => {
	        card.style.animationDelay = `${i * 0.1}s`;
	    });
	}

	function showLoading() {
	    document.getElementById('results').innerHTML = `
	        <div class="loading">
	            <i class="fas fa-spinner-third"></i>
	            <div style="margin-top: 25px; font-size: 1.2rem; color: rgba(255,255,255,0.9); font-weight: 400;">
	                🔍 Scanning millions of research papers...
	            </div>
	            <div style="margin-top: 10px; color: rgba(255,255,255,0.7); font-size: 1rem;">
	                Powered by Semantic Scholar
	            </div>
	        </div>
	    `;
	}

	function showNoResults(query) {
	    document.getElementById('results').innerHTML = `
	        <div class="no-results">
	            <h3><i class="fas fa-search"></i> No papers found for "${query}"</h3>
	            <p style="color: rgba(255,255,255,0.8); margin-bottom: 30px;">Try these trending topics:</p>
	            <div class="tips-grid">
	                <div class="tip-item" onclick="quickSearch('cybersecurity')">
	                    <i class="fas fa-shield-alt" style="color: #ff6b6b;"></i>
	                    <div>cybersecurity</div>
	                </div>
	                <div class="tip-item" onclick="quickSearch('deeplearning')">
	                    <i class="fas fa-brain" style="color: #4ecdc4;"></i>
	                    <div>deeplearning</div>
	                </div>
	                <div class="tip-item" onclick="quickSearch('blockchain')">
	                    <i class="fas fa-link" style="color: #f093fb;"></i>
	                    <div>blockchain</div>
	                </div>
	                <div class="tip-item" onclick="quickSearch('machinelearning')">
	                    <i class="fas fa-robot" style="color: #667eea;"></i>
	                    <div>machine learning</div>
	                </div>
	                <div class="tip-item" onclick="quickSearch('artificialintelligence')">
	                    <i class="fas fa-magic" style="color: #48bb78;"></i>
	                    <div>artificial intelligence</div>
	                </div>
	            </div>
	            <p style="margin-top: 30px; color: rgba(255,255,255,0.7); font-size: 0.95rem;">
	                <i class="fas fa-info-circle"></i> Check VSCode terminal logs for detailed API response
	            </p>
	        </div>
	    `;
	}

	function quickSearch(term) {
	    document.getElementById('searchInput').value = term;
	    searchPapers();
	}

	function searchPapers() {
	    if (isLoading) return;

	    clearTimeout(timeout);

	    const query = document.getElementById("searchInput").value.trim();
	    if (query.length < 2) {
	        showNoResults(query);
	        return;
	    }

	    const btn = document.getElementById("searchBtn");
	    btn.disabled = true;
	    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
	    isLoading = true;

	    showLoading();

	    fetch(`/research-paper-finder/api/papers/search?query=${encodeURIComponent(query)}&limit=12`)
	        .then(res => {
	            if (!res.ok) throw new Error(`HTTP ${res.status}`);
	            return res.json();
	        })
	        .then(data => {
	            console.log('API Response:', data);
	            let papers = data.papers || data;
	            
	            if (!papers || papers.length === 0) {
	                showNoResults(data.query || query);
	            } else {
	                renderPapers(papers);
	            }
	        })
	        .catch(err => {
	            console.error(err);
	            document.getElementById('results').innerHTML = `
	                <div class="no-results">
	                    <h3><i class="fas fa-exclamation-triangle"></i> Connection Error</h3>
	                    <p>Server issue: ${err.message}. Refresh & try again.</p>
	                </div>
	            `;
	        })
	        .finally(() => {
	            setTimeout(() => {
	                isLoading = false;
	                btn.disabled = false;
	                btn.innerHTML = '<i class="fas fa-rocket"></i> Find Papers';
	            }, 1500);
	        });
	}

	// Enter key support
	document.getElementById('searchInput').addEventListener('keypress', (e) => {
	    if (e.key === 'Enter') searchPapers();
	});

	// Focus search input on load
	window.addEventListener('load', () => {
	    document.getElementById('searchInput').focus();
	});
</script>

</body>
</html>
